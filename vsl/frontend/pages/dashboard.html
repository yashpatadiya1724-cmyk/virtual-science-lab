<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard | Virtual Science Lab</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<nav class="navbar scrolled">
  <div class="nav-logo">⚗️ <span>VirtualSciLab</span></div>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="lab.html">Lab</a></li>
    <li><a href="dashboard.html" style="color:var(--primary)">Dashboard</a></li>
    <li><a href="admin.html">Admin</a></li>
  </ul>
  <a href="lab.html" class="btn-primary">🔬 Open Lab</a>
</nav>

<div class="page-wrap">
  <main class="page-main">
    <div class="container">

      <!-- Welcome -->
      <div class="welcome-row">
        <div class="avatar" id="user-avatar">A</div>
        <div class="welcome-text">
          <h2 id="user-name">Welcome back, Arjun Kumar!</h2>
          <p>Class 10 · Government High School, Rajasthan</p>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card"><div class="big" id="s-done">7</div><div class="lbl">Experiments Done</div></div>
        <div class="stat-card"><div class="big" id="s-streak">4 🔥</div><div class="lbl">Day Streak</div></div>
        <div class="stat-card"><div class="big" id="s-score">82%</div><div class="lbl">Avg Score</div></div>
        <div class="stat-card"><div class="big" id="s-time">3.2h</div><div class="lbl">Lab Time</div></div>
        <div class="stat-card"><div class="big" id="s-badges">3</div><div class="lbl">Badges</div></div>
      </div>

      <!-- Grid -->
      <div class="dash-grid">
        <div>
          <!-- In Progress -->
          <div class="sec-card" style="margin-bottom:1.2rem">
            <div class="card-top">
              <div class="card-title">In Progress</div>
              <a href="lab.html" class="card-link">Continue →</a>
            </div>
            <div class="prog-list" id="prog-list"></div>
          </div>
          <!-- Badges -->
          <div class="sec-card">
            <div class="card-top"><div class="card-title">🏆 Badges Earned</div></div>
            <div class="badges-wrap" id="badges-wrap"></div>
          </div>
        </div>

        <div>
          <!-- Completed -->
          <div class="sec-card" style="margin-bottom:1.2rem">
            <div class="card-top"><div class="card-title">✅ Completed</div></div>
            <div class="done-list" id="done-list"></div>
          </div>
          <!-- Recommended -->
          <div class="sec-card">
            <div class="card-top"><div class="card-title">💡 Try Next</div></div>
            <div class="rec-list" id="rec-list"></div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="../js/helpers.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
